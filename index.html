<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Roll Number Spinner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="confettiCanvas"></canvas>

    <main class="app">
        <header class="header">
            <p class="eyebrow">Classroom Picker</p>
            <h1 class="title">Roll Number Spinner</h1>
        </header>

        <section class="controls" aria-label="Roll range controls">
            <div class="input-group">
                <label for="minRoll">From</label>
                <input type="number" id="minRoll" value="1" min="1">
            </div>
            <span class="range-dash" aria-hidden="true">-</span>
            <div class="input-group">
                <label for="maxRoll">To</label>
                <input type="number" id="maxRoll" value="35" min="1">
            </div>
            <button id="setRangeBtn" class="btn btn-set" type="button">Apply</button>
        </section>

        <section class="status-bar" aria-label="Current roll status">
            <span id="rangeLabel" class="status-item">Roll 1-35</span>
            <span class="status-dot" aria-hidden="true"></span>
            <span id="remainingLabel" class="status-item status-remaining">35 remaining today</span>
        </section>

        <section class="wheel-panel">
            <div class="wheel-stage">
                <div class="wheel-glow" id="wheelGlow" aria-hidden="true"></div>
                <div class="pointer" id="pointer" aria-hidden="true">
                    <svg width="32" height="42" viewBox="0 0 32 42" fill="none">
                        <path d="M16 42L0 0h32L16 42z" fill="#f97316"></path>
                        <path d="M16 31L6 5h20L16 31z" fill="#fde68a"></path>
                    </svg>
                </div>
                <div class="wheel-frame">
                    <canvas id="wheel" width="420" height="420" aria-label="Roll number wheel"></canvas>
                    <div class="center-hub" id="centerHub" aria-live="polite">
                        <span class="center-label" id="centerLabel">Ready</span>
                        <span class="center-number" id="centerNumber">-</span>
                    </div>
                </div>
            </div>
            <button id="spinBtn" class="btn btn-spin" type="button">Spin</button>
        </section>

        <div id="allUsedMsg" class="alert-bar hidden" role="status">
            All roll numbers have been selected today.
        </div>

        <section class="history">
            <div class="history-top">
                <span class="history-title">Today's picks</span>
                <button id="resetBtn" class="btn btn-ghost" type="button">Reset</button>
            </div>
            <div id="historyList" class="history-chips">
                <span class="empty-msg">None yet</span>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
